function TagPill({ label, color="#4f5882", bg="#f0f1f8", onRemove, onClick, active, small }) {
  const sz = small?{padding:"1px 7px",fontSize:10}:{padding:"3px 10px",fontSize:11};
  return (
    <span onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:3,borderRadius:999,fontWeight:600,background:active?color:bg,color:active?"#fff":color,cursor:(onClick||onRemove)?"pointer":"default",border:`1px solid ${active?color:"transparent"}`,transition:"all .12s",userSelect:"none",...sz}}>
      {label}

    </span>
  );
}

function Arc({ pct, color, size=34 }) {
  const r=12,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  return (
    <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eef0f6" strokeWidth="2.5"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} transform={`rotate(-90 ${cx} ${cy})`} style={{transition:"stroke-dashoffset .4s"}}/>
      <text x={cx} y={cy+3.5} textAnchor="middle" fontSize="8" fontWeight="700" fill={color}>{pct}%</text>
    </svg>
  );
}

// ─── SKILL PANEL ──────────────────────────────────────────────────────────────
function SkillPanel({ tags, allProjects, color, light }) {
  if (!tags||tags.length===0) return null;
  const gc={};
  allProjects.forEach(p=>p.tags.forEach(t=>{gc[t]=(gc[t]||0)+1;}));
  const maxC=Math.max(1,...Object.values(gc));
  const skills=tags.map(tag=>{
    const count=gc[tag]||1;
    const stars=count>=5?5:count>=4?4:count>=3?3:count>=2?2:1;
    return{tag,count,stars,pct:Math.round((count/maxC)*100)};
  }).sort((a,b)=>b.count-a.count);
  const labels=["入门","基础","熟练","精通","专家"];
  return (
    <div style={{borderTop:"1px solid #f0f2f8",marginTop:14,paddingTop:14}}>
      <div style={{fontSize:10,fontWeight:700,color:"#a8afc4",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>
        ⚡ 能力图谱 <span style={{fontSize:9,fontWeight:400,color:"#c8cede",marginLeft:4}}>基于全库项目经历自动生成</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px"}}>
        {skills.map(({tag,count,stars,pct})=>(
          <div key={tag}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:12,color:"#1a1d2e",fontWeight:600}}>{tag}</span>
                <span style={{fontSize:9,color,background:light,padding:"1px 5px",borderRadius:999,fontWeight:700,border:`1px solid ${color}22`}}>{labels[stars-1]}</span>
              </div>
              <div style={{display:"flex",gap:2}}>
                {[1,2,3,4,5].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:i<=stars?color:"#e8eaf4"}}/>)}
              </div>
            </div>
            <div style={{height:3,background:"#eaecf5",borderRadius:999,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${color}77,${color})`,borderRadius:999}}/>
            </div>
            <div style={{fontSize:9,color:"#c8cede",marginTop:2}}>出现于 {count} 个项目</div>
          </div>
        ))}
      </div>
    </div>
  );
}

      </div>
    </div>
  );
}

// ─── PROJECT ROW ──────────────────────────────────────────────────────────────

            <button key={title} onClick={fn} title={title} style={{width:28,height:28,borderRadius:7,border:"1px solid #e4e7f0",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#a8afc4",transition:"all .12s"}} onMouseEnter={e=>{e.currentTarget.style.background=hBg;e.currentTarget.style.borderColor=hBd;e.currentTarget.style.color=hCo;}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#e4e7f0";e.currentTarget.style.color="#a8afc4";}}>{icon}</button>

            </div>
            <div>
              {p.metrics.length>0&&(<div style={{borderRadius:9,overflow:"hidden",border:"1px solid #e8eaf4",marginBottom:12}}><div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 76px",padding:"5px 10px",background:"#f4f5fb"}}>{["指标","优化前","优化后","变化"].map(h=><span key={h} style={{fontSize:10,fontWeight:700,color:"#a8afc4",textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</span>)}</div>{p.metrics.map((m,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 76px",padding:"7px 10px",borderTop:"1px solid #f0f2f8"}}><span style={{fontSize:12,color:"#1a1d2e",fontWeight:600}}>{m.label}</span><span style={{fontSize:12,color:"#a8afc4"}}>{m.before}</span><span style={{fontSize:12,color:"#1a1d2e"}}>{m.after}</span><span style={{fontSize:12,fontWeight:700,color:done?"#059669":"#c2410c"}}>{m.delta}</span></div>))}</div>)}

              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                <button onClick={e=>{e.stopPropagation();onEdit(p);}} style={{padding:"6px 12px",borderRadius:7,border:"1px solid #e4e7f0",background:"transparent",fontSize:12,fontWeight:600,color:"#4a4f6a",cursor:"pointer",fontFamily:"inherit"}}>✎ 编辑</button>
                <button onClick={e=>{e.stopPropagation();onInterview(p);}} style={{padding:"6px 12px",borderRadius:7,border:`1px solid ${tmpl.color}44`,background:tmpl.light,fontSize:12,fontWeight:600,color:tmpl.color,cursor:"pointer",fontFamily:"inherit"}}>🎤 面试模拟</button>
                <button onClick={e=>{e.stopPropagation();onToggleStatus(p.id);}} style={{padding:"6px 12px",borderRadius:7,border:"1px solid #e4e7f0",background:"transparent",fontSize:12,fontWeight:600,color:"#6b7280",cursor:"pointer",fontFamily:"inherit"}}>{done?"↩ 重新进行":"✓ 标记完成"}</button>
                <button onClick={e=>{e.stopPropagation();onDelete(p.id);}} style={{padding:"6px 12px",borderRadius:7,border:"1px solid #fca5a5",background:"#fff5f5",fontSize:12,fontWeight:600,color:"#ef4444",cursor:"pointer",fontFamily:"inherit"}}>🗑 删除</button>
              </div>
            </div>
          </div>
          <SkillPanel tags={p.tags} allProjects={allProjects} color={tmpl.color} light={tmpl.light}/>
        </div>
      )}
    </div>
  );
}

// ─── EDIT DRAWER ──────────────────────────────────────────────────────────────
function EditDrawer({ project, onSave, onClose }) {
  const blank={id:null,industry:"product",status:"ongoing",title:"",description:"",startDate:"",endDate:"",jobTitle:"",company:"",extraFields:{},metrics:[],tags:[],progress:0,highlights:""};
  const [form,setForm]=useState(project||blank);
  const [tagInput,setTagInput]=useState("");
  const [saving,setSaving]=useState(false);
  const tmpl=T[form.industry];
  const s=(k,v)=>setForm(p=>({...p,[k]:v}));
  const sx=(k,v)=>setForm(p=>({...p,extraFields:{...p.extraFields,[k]:v}}));
  const addM=()=>setForm(p=>({...p,metrics:[...p.metrics,{label:"",before:"",after:"",delta:""}]}));
  const updM=(i,u)=>setForm(p=>{const m=[...p.metrics];m[i]={...m[i],...u};return{...p,metrics:m};});
  const delM=(i)=>setForm(p=>({...p,metrics:p.metrics.filter((_,j)=>j!==i)}));
  const addTag=t=>{if(t&&!form.tags.includes(t))s("tags",[...form.tags,t]);setTagInput("");};
  const delTag=t=>s("tags",form.tags.filter(x=>x!==t));
  const inp={padding:"8px 11px",borderRadius:8,border:"1px solid #e4e7f0",fontSize:13,fontFamily:"inherit",background:"#fafbff",color:"#1a1d2e",outline:"none",width:"100%",boxSizing:"border-box"};
  const lbl={display:"block",fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:"#a8afc4",marginBottom:4};
  const handleSave=async()=>{setSaving(true);await onSave(form);setSaving(false);};
  return (
    <div style={{position:"fixed",inset:0,zIndex:600,display:"flex"}}>
      <div onClick={onClose} style={{flex:1,background:"rgba(15,18,40,.4)",backdropFilter:"blur(2px)"}}/>
      <div style={{width:520,background:"#fff",overflowY:"auto",boxShadow:"-8px 0 40px rgba(0,0,0,.12)"}}>
        <div style={{padding:"18px 22px 14px",borderBottom:"1px solid #eef0f6",position:"sticky",top:0,background:"#fff",zIndex:10,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{tmpl.icon}</span>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15,color:"#1a1d2e"}}>{form._dbid?"编辑项目":"新建项目"}</div><div style={{fontSize:11,color:"#a8afc4",marginTop:1}}>{tmpl.name} 模板</div></div>
          <button onClick={onClose} style={{background:"#f3f4fa",border:"none",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{padding:"18px 22px",display:"flex",flexDirection:"column",gap:13}}>
          <div><label style={lbl}>行业模板</label><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{Object.values(T).map(t=>(<button key={t.id} onClick={()=>s("industry",t.id)} style={{padding:"5px 11px",borderRadius:7,border:`2px solid ${form.industry===t.id?t.color:"#e4e7f0"}`,background:form.industry===t.id?t.light:"#fafbff",color:form.industry===t.id?t.color:"#8891a8",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{t.icon} {t.name}</button>))}</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={lbl}>状态</label><div style={{display:"flex",gap:6}}>{[["ongoing","⏳ 进行中","#c2410c","#fff8e8"],["done","✓ 已完成","#059669","#d1fae5"]].map(([v,l,c,bg])=>(<button key={v} onClick={()=>s("status",v)} style={{flex:1,padding:"6px",borderRadius:8,border:`2px solid ${form.status===v?c:"#e4e7f0"}`,background:form.status===v?bg:"#fafbff",color:form.status===v?c:"#8891a8",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>))}</div></div>
            {form.status==="ongoing"&&(<div><label style={lbl}>进度 {form.progress}%</label><input type="range" min="0" max="100" value={form.progress} onChange={e=>s("progress",+e.target.value)} style={{width:"100%",accentColor:tmpl.color,marginTop:7}}/></div>)}
          </div>
          <div><label style={lbl}>项目名称</label><input style={inp} value={form.title} onChange={e=>s("title",e.target.value)} placeholder={tmpl.ph.title}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <div><label style={lbl}>岗位名称</label><input style={inp} value={form.jobTitle||""} onChange={e=>s("jobTitle",e.target.value)} placeholder="例：高级产品经理"/><div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>{tmpl.jobs.slice(0,4).map(j=>(<button key={j} onClick={()=>s("jobTitle",j)} style={{padding:"2px 7px",borderRadius:999,border:`1px solid ${form.jobTitle===j?tmpl.color:"#e4e7f0"}`,background:form.jobTitle===j?tmpl.light:"transparent",color:form.jobTitle===j?tmpl.color:"#a8afc4",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{j}</button>))}</div></div>
            <div><label style={lbl}>所在公司</label><input style={inp} value={form.company||""} onChange={e=>s("company",e.target.value)} placeholder="公司名称"/></div>
            <div><label style={lbl}>开始时间</label><input style={inp} value={form.startDate||""} onChange={e=>s("startDate",e.target.value)} placeholder="2024-01"/></div>
            <div><label style={lbl}>结束时间</label><input style={inp} value={form.endDate||""} onChange={e=>s("endDate",e.target.value)} placeholder="留空=至今"/></div>
          </div>
          <div><label style={lbl}>项目描述</label><textarea style={{...inp,resize:"vertical"}} rows={3} value={form.description} onChange={e=>s("description",e.target.value)} placeholder={tmpl.ph.desc}/></div>
          <div style={{background:tmpl.light,borderRadius:10,padding:"12px 14px",border:`1px solid ${tmpl.color}22`}}>
            <div style={{fontSize:10,fontWeight:700,color:tmpl.color,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>{tmpl.icon} {tmpl.name}专属字段</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>{tmpl.fields.map(f=>(<div key={f}><label style={{...lbl,color:tmpl.color}}>{f}</label><input style={{...inp,background:"#fff",border:`1px solid ${tmpl.color}33`}} value={form.extraFields[f]||""} onChange={e=>sx(f,e.target.value)} placeholder={`填写${f}`}/></div>))}</div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><label style={{...lbl,marginBottom:0}}>量化成果</label><button onClick={addM} style={{fontSize:11,color:tmpl.color,background:tmpl.light,border:`1px solid ${tmpl.color}33`,borderRadius:6,padding:"3px 9px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>+ 添加</button></div>
            <div style={{fontSize:11,color:"#a8afc4",marginBottom:7}}>参考：{tmpl.metrics.join(" · ")}</div>
            {form.metrics.length>0&&(<div style={{display:"grid",gridTemplateColumns:"1.3fr .8fr .8fr 1fr 20px",gap:5,marginBottom:5}}>{["指标","优化前","优化后","变化",""].map((h,i)=><span key={i} style={{fontSize:10,color:"#a8afc4",fontWeight:600}}>{h}</span>)}</div>)}
            {form.metrics.map((m,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1.3fr .8fr .8fr 1fr 20px",gap:5,marginBottom:5,alignItems:"center"}}>{[["label","指标名"],["before","优化前"],["after","优化后"],["delta","变化"]].map(([k,ph])=>(<input key={k} style={{...inp,padding:"6px 8px",fontSize:12}} value={m[k]} onChange={e=>updM(i,{[k]:e.target.value})} placeholder={ph}/>))}<button onClick={()=>delM(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#d1d5db",fontSize:16,padding:0}}>×</button></div>))}
          </div>
          <div>
            <label style={lbl}>分类标签</label>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>{tmpl.tags.map(t=>(<TagPill key={t} label={t} color={tmpl.color} bg={tmpl.light} active={form.tags.includes(t)} onClick={()=>form.tags.includes(t)?delTag(t):addTag(t)} small/>))}</div>
            <input style={inp} value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTag(tagInput)} placeholder="自定义标签，Enter 添加"/>
            {form.tags.filter(t=>!tmpl.tags.includes(t)).length>0&&(<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>{form.tags.filter(t=>!tmpl.tags.includes(t)).map(t=><TagPill key={t} label={t} color={tmpl.color} bg={tmpl.light} onRemove={()=>delTag(t)} small/>)}</div>)}
          </div>
          <div><label style={lbl}>亮点备注</label><textarea style={{...inp,resize:"vertical"}} rows={2} value={form.highlights} onChange={e=>s("highlights",e.target.value)} placeholder="项目亮点、特殊突破或补充说明"/></div>
          <button onClick={handleSave} disabled={saving} style={{padding:"11px",background:saving?"#a8d8da":tmpl.color,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:saving?"not-allowed":"pointer",fontFamily:"inherit",marginTop:2,transition:"background .2s"}}>
            {saving?"保存中…":"💾 保存项目"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

  const [interviewProject, setInterviewProject] = useState(null);
  const [filterInd, setFilterInd]       = useState("all");
  const [filterJob, setFilterJob]       = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterTag, setFilterTag]       = useState("");
  const [search, setSearch]             = useState("");

  // Auth listener
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setAuthReady(true);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? null);
      setAuthReady(true);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Load projects when user logs in
  useEffect(() => {
    if (!user) { setProjects([]); return; }
    setDbLoading(true);
    sb.from("projects").select("*").eq("user_id", user.id).order("created_at", { ascending: false })
      .then(({ data, error }) => {
        if (error) { console.error(error); setDbLoading(false); return; }
        if (data.length === 0) {
          // First login — seed with sample data
          const rows = SAMPLE.map(p => ({ user_id: user.id, data: { ...p, id: Date.now() + Math.random() } }));
          sb.from("projects").insert(rows).select().then(({ data: newRows }) => {
            if (newRows) setProjects(newRows.map(r => ({ ...r.data, _dbid: r.id })));
            setDbLoading(false);
          });
        } else {
          setProjects(data.map(r => ({ ...r.data, _dbid: r.id })));
          setDbLoading(false);
        }
      });
  }, [user]);

  // Save / update a project
  const save = async (form) => {
    const { _dbid, ...cleanForm } = form;
    try {
      if (_dbid) {
        const { error } = await sb.from("projects")
          .update({ data: cleanForm, updated_at: new Date().toISOString() })
          .eq("id", _dbid);
        if (error) throw error;
        setProjects(p => p.map(x => x._dbid === _dbid ? { ...cleanForm, _dbid } : x));
      } else {
        const newForm = { ...cleanForm, id: Date.now() };
        const { data, error } = await sb.from("projects")
          .insert({ user_id: user.id, data: newForm })
          .select().single();
        if (error) throw error;
        if (data) setProjects(p => [{ ...data.data, _dbid: data.id }, ...p]);
      }
      setEditing(null);
    } catch(e) {
      alert('保存失败：' + e.message);
    }
  };

  const del = async (id) => {
    const p = projects.find(x => x.id === id);
    if (p?._dbid) await sb.from("projects").delete().eq("id", p._dbid);
    setProjects(prev => prev.filter(x => x.id !== id));
    if (expanded === id) setExpanded(null);
  };

  const toggleStatus = async (id) => {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    const updated = { ...p, status: p.status === "done" ? "ongoing" : "done", progress: p.status === "done" ? 80 : 100 };
    if (p._dbid) await sb.from("projects").update({ data: updated, updated_at: new Date().toISOString() }).eq("id", p._dbid);
    setProjects(prev => prev.map(x => x.id === id ? updated : x));
  };

  const signOut = () => sb.auth.signOut();

  const availableJobs = useMemo(() =>
    [...new Set((filterInd === "all" ? projects : projects.filter(p => p.industry === filterInd)).map(p => p.jobTitle).filter(Boolean))],
    [filterInd, projects]
  );

  const filtered = useMemo(() => projects.filter(p => {
    if (filterInd !== "all" && p.industry !== filterInd) return false;
    if (filterJob !== "all" && p.jobTitle !== filterJob) return false;
    if (filterStatus !== "all" && p.status !== filterStatus) return false;
    if (filterTag && !p.tags.includes(filterTag)) return false;
    if (search && !p.title.includes(search) && !p.description.includes(search)) return false;
    return true;
  }), [projects, filterInd, filterJob, filterStatus, filterTag, search]);

  const ongoing = filtered.filter(p => p.status === "ongoing");
  const done    = filtered.filter(p => p.status === "done");
  const tagBase = filterInd === "all" ? projects : projects.filter(p => p.industry === filterInd);
  const tagCounts = {}; tagBase.forEach(p => p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
  const allTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).map(([t]) => t);
  const totalMetrics = projects.reduce((a, p) => a + p.metrics.length, 0);

  // ── Render states ──
  if (!authReady) return <Spinner text="初始化中…"/>;
  if (!user)      return <LoginPage/>;
  if (dbLoading)  return <Spinner text="正在加载你的项目…"/>;

  const avatar = user.user_metadata?.avatar_url;
  const displayName = user.user_metadata?.full_name || user.user_metadata?.user_name || user.email?.split("@")[0] || "我";

  return (
    <div style={{height:"100vh",background:"#f2f3f9",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* ── NAV ── */}
      <div style={{background:"#fff",borderBottom:"1px solid #e8eaf4",padding:"0 16px",flexShrink:0}}>
        <div style={{height:52,display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginRight:4,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#0d7377,#14a085)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📋</div>
            <span style={{fontWeight:900,fontSize:15,color:"#1a1d2e",letterSpacing:"-0.3px"}}>little case by 美美泳谕</span>
          </div>
          <div style={{position:"relative",width:170,flexShrink:0}}>
            <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#bbb"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜索项目…" style={{width:"100%",padding:"6px 10px 6px 26px",borderRadius:8,border:"none",fontSize:12,fontFamily:"inherit",background:"#f2f3f9",color:"#1a1d2e",outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <span style={{fontSize:11,color:"#a8afc4",fontWeight:600}}>行业</span>
            <select value={filterInd} onChange={e=>{setFilterInd(e.target.value);setFilterJob("all");}} style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e4e7f0",fontSize:12,fontFamily:"inherit",background:"#fff",color:"#1a1d2e",outline:"none",cursor:"pointer"}}>
              <option value="all">全部</option>
              {Object.values(T).map(t=><option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
            </select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <span style={{fontSize:11,color:"#a8afc4",fontWeight:600}}>岗位</span>
            <select value={filterJob} onChange={e=>setFilterJob(e.target.value)} style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e4e7f0",fontSize:12,fontFamily:"inherit",background:"#fff",color:"#1a1d2e",outline:"none",cursor:"pointer",maxWidth:130}}>
              <option value="all">全部</option>
              {availableJobs.map(j=><option key={j} value={j}>{j}</option>)}
            </select>
          </div>
          <div style={{display:"flex",background:"#f2f3f9",borderRadius:8,overflow:"hidden",flexShrink:0}}>
            {[["all","全部"],["ongoing","进行中"],["done","已完成"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterStatus(v)} style={{padding:"5px 10px",border:"none",background:filterStatus===v?"#1a1d2e":"transparent",color:filterStatus===v?"#fff":"#8891a8",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{l}</button>
            ))}
          </div>
          <button onClick={()=>setEditing({})} style={{marginLeft:"auto",padding:"7px 14px",background:"#0d7377",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>+ 新建</button>

          {/* User avatar + logout */}
          <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0,paddingLeft:4,borderLeft:"1px solid #f0f2f8",marginLeft:4}}>
            {avatar
              ? <img src={avatar} style={{width:26,height:26,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt=""/>
              : <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#0d7377,#14a085)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{displayName.charAt(0).toUpperCase()}</div>
            }
            <span style={{fontSize:12,color:"#4a4f6a",fontWeight:600,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{displayName}</span>
            <button onClick={signOut} style={{fontSize:11,color:"#a8afc4",background:"none",border:"1px solid #e4e7f0",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>退出</button>
          </div>
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* SIDEBAR */}
        <div style={{width:172,flexShrink:0,background:"#fff",borderRight:"1px solid #e8eaf4",overflowY:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"14px 14px 10px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#a8afc4",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>概览</div>
            {[{label:"全部项目",val:projects.length,c:"#1a1d2e"},{label:"进行中",val:projects.filter(p=>p.status==="ongoing").length,c:"#c2410c"},{label:"已完成",val:projects.filter(p=>p.status==="done").length,c:"#059669"},{label:"量化指标",val:`${totalMetrics}条`,c:"#0d7377"}].map(s=>(
              <div key={s.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #f4f5fb"}}>
                <span style={{fontSize:12,color:"#6b7280"}}>{s.label}</span>
                <span style={{fontSize:13,fontWeight:800,color:s.c}}>{s.val}</span>
              </div>
            ))}
          </div>
          <div style={{padding:"10px 14px",flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"#a8afc4",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>标签筛选</div>
            <button onClick={()=>setFilterTag("")} style={{width:"100%",textAlign:"left",padding:"5px 9px",borderRadius:7,border:"none",background:filterTag===""?"#1a1d2e":"transparent",color:filterTag===""?"#fff":"#6b7280",fontSize:12,fontWeight:filterTag===""?700:400,cursor:"pointer",fontFamily:"inherit",marginBottom:2,transition:"all .12s"}}>全部标签</button>
            {allTags.length===0&&<div style={{fontSize:11,color:"#c8cede",padding:"4px 9px"}}>暂无标签</div>}
            {allTags.map(t=>{
              const cnt=tagBase.filter(p=>p.tags.includes(t)).length;
              const active=filterTag===t;
              const proj=projects.find(p=>p.tags.includes(t)&&(filterInd==="all"||p.industry===filterInd));
              const c=proj?T[proj.industry].color:"#4f5882";
              return (<button key={t} onClick={()=>setFilterTag(active?"":t)} style={{width:"100%",textAlign:"left",padding:"5px 9px",borderRadius:7,border:"none",background:active?`${c}18`:"transparent",color:active?c:"#6b7280",fontSize:12,fontWeight:active?700:400,cursor:"pointer",fontFamily:"inherit",marginBottom:1,display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all .12s"}}><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:6}}>{t}</span><span style={{fontSize:10,color:active?c:"#c8cede",fontWeight:700,flexShrink:0}}>{cnt}</span></button>);
            })}
          </div>
        </div>

        {/* CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#a8afc4",background:"#fff",borderRadius:14,border:"1.5px dashed #e4e7f0",marginTop:8}}>
              <div style={{fontSize:36,marginBottom:10}}>📭</div>
              <div style={{fontWeight:600,marginBottom:4}}>暂无匹配项目</div>
              <button onClick={()=>setEditing({})} style={{marginTop:8,fontSize:13,color:"#0d7377",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>+ 新建项目</button>
            </div>
          ):(
            <div>
              {(filterStatus==="all"||filterStatus==="ongoing")&&ongoing.length>0&&(
                <div style={{marginBottom:filterStatus==="all"&&done.length>0?20:0}}>
                  {filterStatus==="all"&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:9}}><span style={{fontSize:12,fontWeight:800,color:"#c2410c"}}>⏳ 进行中</span><span style={{fontSize:10,color:"#c2410c",background:"#fff8e8",padding:"1px 7px",borderRadius:999,border:"1px solid #fed7aa",fontWeight:700}}>{ongoing.length}</span></div>}
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {ongoing.map(p=><ProjectRow key={p.id} p={p} expanded={expanded===p.id} onToggle={()=>setExpanded(expanded===p.id?null:p.id)} onEdit={setEditing} onDelete={del} onToggleStatus={toggleStatus} onInterview={setInterviewProject} allProjects={projects}/>)}
                  </div>
                </div>
              )}
              {(filterStatus==="all"||filterStatus==="done")&&done.length>0&&(
                <div>
                  {filterStatus==="all"&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:9}}><span style={{fontSize:12,fontWeight:800,color:"#059669"}}>✅ 已完成</span><span style={{fontSize:10,color:"#059669",background:"#d1fae5",padding:"1px 7px",borderRadius:999,border:"1px solid #a7f3d0",fontWeight:700}}>{done.length}</span></div>}
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {done.map(p=><ProjectRow key={p.id} p={p} expanded={expanded===p.id} onToggle={()=>setExpanded(expanded===p.id?null:p.id)} onEdit={setEditing} onDelete={del} onToggleStatus={toggleStatus} onInterview={setInterviewProject} allProjects={projects}/>)}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {editing!==null&&<EditDrawer project={Object.keys(editing).length>0?editing:null} onSave={save} onClose={()=>setEditing(null)}/>}
      {interviewProject&&<InterviewModal project={interviewProject} onClose={()=>setInterviewProject(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
